<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVICIO DE REPARACIONES MÓVILES</title>
    <link rel="stylesheet" href="bootstrap/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <header class="header-info">
            <b><i>Tecnología, Teléfonos, reparaciones, repuestos y accesorios</i></b>
            <img src="REPARACION1.PNG.png" alt="Logo Reparaciones" class="logo">
        </header>

        <section class="form-section">
            <div class="form-row">
                <label>Usuario:</label>
                <input type="text" placeholder="Ingresa tu usuario">
            </div>
            <div class="form-row">
                <label>Contraseña:</label>
                <input type="password" placeholder="••••••••">
            </div>
        </section>

        <hr class="divider">

        <section class="form-section">
            <h2 class="section-title">Crear cuenta</h2>
            <form id="registerForm" novalidate>
                <div class="form-row">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" required minlength="2">
                </div>

                <div class="form-row">
                    <label for="email">Correo:</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-row">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" required minlength="6">
                </div>

                <div id="formError" class="error-message"></div>

                <div class="button-group">
                    <button type="submit" class="btn-main">Crear usuario</button>
                </div>
            </form>
        </section>
    </div>

    <script src="bootstrap/bootstrap-5.3.8-dist/js/bootstrap.min.js"></script>
    <script>
        const form = document.getElementById('registerForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Usuario registrado (Simulación)");
        });
    </script>
</body>
</html>
